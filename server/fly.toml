# Fly.io config for the backend (Express + Socket.io)
# Run: fly launch --no-deploy (first time) then fly deploy
# App name — change this to something unique on fly.io
app = "polling-system-backend"
primary_region = "iad"

[build]

[env]
  PORT = "5000"
  NODE_ENV = "production"
  DEFAULT_POLL_TIMER = "60"
  # Do NOT put secrets here — use: fly secrets set MONGO_URI=... CORS_ORIGIN=... SESSION_SECRET=...

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  # Required for Socket.io long-polling + WebSocket upgrades
  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
